<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Amrit Tech Study</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-brand">
        <h1>Amrit-Tech-Study</h1>
        <p>Learn online, practice mock tests, watch videos and track your progress.</p>
    </div>

    <div class="form-container">
        <div class="auth-icon">🎓</div>

        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to continue learning</p>

        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="loginUser()">Login</button>
        <p><a href="forgot-password.html">Forgot password / Verify email?</a></p>

        <p class="auth-link">
            Don't have an account?
            <a href="register.html">Create Account</a>
        </p>
    </div>
</div>

<script src="js/script.js"></script>
<script>
    loadTheme();
</script>
</body>
</html>
